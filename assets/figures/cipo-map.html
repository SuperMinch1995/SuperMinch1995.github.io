    font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;

    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;

  body.dark .map-subtitle { color: #9E9890; }

  body.dark #map { background: #2A271F; }

  body.dark .leaflet-control-zoom a {
    border-color: #3a3530 !important;
    color: #9E9890 !important;
    background: #232019 !important;

// ── Détection du thème via postMessage du parent, fallback système ────────────
const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
let currentDark = isDark;

function applyTheme(dark) {
  currentDark = dark;
  if (dark) {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
  // Changer les tuiles
  if (tileLayer) {
    map.removeLayer(tileLayer);
    tileLayer = dark ? darkTiles : lightTiles;
    tileLayer.addTo(map);
    map.getPane('tilePane').style.filter = dark ? 'none' : 'saturate(0.07) brightness(1.07) sepia(0.10)';
  }
  // Mettre à jour la couleur des ronds
  ACCENT = dark ? '#E8845A' : '#E8845A';
  buildMarkers();
}

// Écoute le thème envoyé par la page parente
window.addEventListener('message', function(e) {
  if (e.data && typeof e.data.dark !== 'undefined') {
    applyTheme(e.data.dark);
  }
});

// Demande le thème au parent
window.parent.postMessage({ requestTheme: true }, '*');

// ── Clustering ───────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const MERGE_KM = 50;
const points = PATIENTS.map(([label, lng, lat]) => ({ label, lng, lat }));
const assigned = new Array(points.length).fill(-1);
const clusters = [];

points.forEach((pt, i) => {
  if (assigned[i] !== -1) return;
  const clusterIdx = clusters.length;
  clusters.push({ members: [i], lat: pt.lat, lng: pt.lng, label: pt.label });
  assigned[i] = clusterIdx;
  points.forEach((other, j) => {
    if (assigned[j] !== -1) return;
    if (haversine(pt.lat, pt.lng, other.lat, other.lng) <= MERGE_KM) {
      clusters[clusterIdx].members.push(j);
      assigned[j] = clusterIdx;
      if (isNaN(parseInt(other.label.charAt(0)))) clusters[clusterIdx].label = other.label;
    }
  });
  const c = clusters[clusterIdx];
  c.lat = c.members.reduce((s, idx) => s + points[idx].lat, 0) / c.members.length;
  c.lng = c.members.reduce((s, idx) => s + points[idx].lng, 0) / c.members.length;
});

function r(n) { return 5 + 5.5 * Math.sqrt(n); }

let ACCENT = isDark ? '#E8845A' : '#E8845A';

// ── Carte ────────────────────────────────────────────────────────────────────
const lightTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 });
const darkTiles  = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',  { maxZoom: 19 });

const map = L.map('map', {
  center: [25, 15], zoom: 2,
  zoomControl: true,
  attributionControl: false
});

let tileLayer = isDark ? darkTiles : lightTiles;
tileLayer.addTo(map);

if (!isDark) {
  map.getPane('tilePane').style.filter = 'saturate(0.07) brightness(1.07) sepia(0.10)';
}

// Appliquer la classe dark si nécessaire
if (isDark) document.body.classList.add('dark');

const LABEL_ZOOM = 4;
const circleLayer = L.layerGroup().addTo(map);
const labelLayer  = L.layerGroup().addTo(map);

function buildMarkers() {
  circleLayer.clearLayers();
  labelLayer.clearLayers();
  const showLabels = map.getZoom() >= LABEL_ZOOM;
  clusters.forEach(c => {
    const n = c.members.length;
    const radius = r(n);
    const fontSize = Math.max(9, Math.min(14, radius * 0.7));
    L.circleMarker([c.lat, c.lng], {
      radius,
      fillColor: ACCENT,
      color: currentDark ? 'transparent' : '#EDE8DF',
      weight: currentDark ? 0 : 0.6,
      fillOpacity: 0.75,
      interactive: false
    }).addTo(circleLayer);
    if (showLabels) {
      const size = radius * 2;
      const icon = L.divIcon({
        className: 'count-label',
        html: `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;">${n}</div>`,
        iconSize: [size, size],
        iconAnchor: [radius, radius]
      });
      L.marker([c.lat, c.lng], { icon, interactive: false }).addTo(labelLayer);
    }
  });
}

buildMarkers();
map.on('zoomend', buildMarkers);
