<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPO Patient Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #E07B40;
  --dark:   #3A2E2A;
  --muted:  rgba(58, 46, 42, 0.52);
  --cream:  #FAF7F2;
  --beige:  #F5EFE7;
}

body {
  font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
  background: transparent;
}

#map-wrapper {
  position: relative;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  background: transparent;
}

#map-header {
  padding: 18px 18px 14px;
}

.map-title {
  font-size: 16px;
  font-weight: 600;
  color: #4a4540;
  letter-spacing: 0.005em;
  line-height: 1.3;
}

.map-citation {
  font-size: 13px;
  color: #4a4540;
  font-weight: 400;
  margin-top: 4px;
  line-height: 1.4;
}

.map-subtitle {
  font-size: 12px;
  color: rgba(74, 69, 64, 0.7);
  font-weight: 400;
  margin-top: 8px;
  letter-spacing: 0.01em;
}

#map {
  width: 100%;
  height: 490px;
  background: #e8e3db;
}

/* Restore the original gray-beige look on the tiles */
.leaflet-tile-pane {
  filter: saturate(0.07) brightness(1.07) sepia(0.10);
}

.map-note {
  font-size: 10px;
  color: rgba(58, 46, 42, 0.45);
  font-style: italic;
  text-align: center;
  padding: 11px 18px 14px;
  background: transparent;
  letter-spacing: 0.015em;
  line-height: 1.6;
}
.map-note span {
  display: block;
}

.leaflet-container {
  font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
  background: #e8e3db !important;
}

.leaflet-control-zoom a {
  border-color: #ddd !important;
  color: #666 !important;
  background: #FAF7F2 !important;
}

.count-label {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #fff;
  pointer-events: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.35);
  line-height: 1;
}

.story-halo-icon {
  background: transparent !important;
  border: none !important;
  cursor: pointer;
}
.halo-dot {
  border-radius: 50%;
  background: transparent;
  animation: storyPulse 1.6s ease-in-out infinite;
}
@keyframes storyPulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(245, 200, 66, 0),
                0 0 0 0 rgba(245, 200, 66, 0),
                0 0 0 0 rgba(245, 200, 66, 0);
  }
  50% {
    box-shadow: 0 0 0 6px rgba(245, 200, 66, 0.7),
                0 0 24px 4px rgba(245, 200, 66, 0.55),
                0 0 48px 8px rgba(245, 200, 66, 0.3);
  }
}

#story-sheet {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--cream);
  border-radius: 12px 12px 0 0;
  box-shadow: 0 -2px 24px rgba(58, 46, 42, 0.18);
  z-index: 1000;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  max-width: 900px;
  max-height: 70vh;
  margin: 0 auto;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
#story-sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 36px;
  height: 3px;
  background: rgba(58, 46, 42, 0.18);
  border-radius: 2px;
  margin: 12px auto 0;
}

.sheet-inner { padding: 12px 22px 30px; }

.sheet-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 8px;
}

.sheet-location {
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  line-height: 1.4;
  padding-top: 2px;
}

.sheet-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  line-height: 1;
  padding: 3px 5px;
  border-radius: 4px;
  transition: color 0.15s ease;
  flex-shrink: 0;
}
.sheet-close:hover { color: var(--dark); }

.sheet-story {
  font-size: 13.5px;
  line-height: 1.78;
  color: var(--dark);
  font-weight: 400;
}
.sheet-story p { margin: 0 0 0.85em; }
.sheet-story p:last-child { margin-bottom: 0; }

/* V1 — Inline opening + closing marks that follow the text rhythm */
.sheet-story blockquote {
  margin: 1.1em 4px 0 4px;
  padding: 4px;
  font-family: Georgia, 'Times New Roman', serif;
  font-style: italic;
  font-size: 14.5px;
  line-height: 1.65;
  color: var(--dark);
  border: none;
}
.sheet-story blockquote .open-mark,
.sheet-story blockquote .close-mark {
  display: inline;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 30px;
  font-style: normal;
  color: var(--accent);
  line-height: 0;
  font-weight: 400;
  position: relative;
  top: 6px;
}
.sheet-story blockquote .open-mark {
  margin-right: 3px;
}
.sheet-story blockquote .close-mark {
  margin-left: 3px;
}

#sheet-overlay {
  position: fixed;
  inset: 0;
  z-index: 999;
  display: none;
}
#sheet-overlay.active { display: block; }

@media (max-width: 480px) {
  #map { height: 420px; }
  .map-title { font-size: 15px; }
  .map-citation { font-size: 12px; }
  .sheet-inner { padding: 10px 16px 26px; }
  .sheet-story { font-size: 13px; }
  .sheet-story blockquote {
    font-size: 13.5px;
    padding: 4px;
  }
  .sheet-story blockquote .open-mark,
  .sheet-story blockquote .close-mark {
    font-size: 26px;
    top: 5px;
  }
}
</style>
</head>

/*

const STORIES = [

    location: "Île-de-France · Metropolitan France",

  center: [25, 15],
  zoom: 2,
  zoomControl: true,
  attributionControl: false

/* CartoDB Positron WITHOUT labels — pure geography, no language issues at all.
   The CSS filter on .leaflet-tile-pane desaturates everything to gray-beige. */
L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
  { maxZoom: 19, subdomains: 'abcd' }
).addTo(map);

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const MERGE_KM = 50;
const points   = PATIENTS.map(([label, lng, lat]) => ({ label, lng, lat }));
const assigned = new Array(points.length).fill(-1);
const clusters = [];

points.forEach((pt, i) => {
  if (assigned[i] !== -1) return;
  const ci = clusters.length;
  clusters.push({ members: [i], lat: pt.lat, lng: pt.lng, label: pt.label });
  assigned[i] = ci;
  points.forEach((other, j) => {
    if (assigned[j] !== -1) return;
    if (haversine(pt.lat, pt.lng, other.lat, other.lng) <= MERGE_KM) {
      clusters[ci].members.push(j);
      assigned[j] = ci;
      if (isNaN(parseInt(other.label.charAt(0)))) clusters[ci].label = other.label;
    }
  });
  const c = clusters[ci];
  c.lat = c.members.reduce((s, idx) => s + points[idx].lat, 0) / c.members.length;
  c.lng = c.members.reduce((s, idx) => s + points[idx].lng, 0) / c.members.length;
});

function dotRadius(n) { return 5 + 5.5 * Math.sqrt(n); }

const circleLayer    = L.layerGroup().addTo(map);
const storyHaloLayer = L.layerGroup().addTo(map);
const labelLayer     = L.layerGroup().addTo(map);
const LABEL_ZOOM     = 4;

function findStoryForCluster(c) {
  return STORIES.find(s =>
    Math.abs(c.lat - s.lat) < 0.5 && Math.abs(c.lng - s.lng) < 0.5
  );
}

function buildMarkers() {
  circleLayer.clearLayers();
  storyHaloLayer.clearLayers();
  labelLayer.clearLayers();
  const showLabels = map.getZoom() >= LABEL_ZOOM;

  clusters.forEach(c => {
    const n      = c.members.length;
    const radius = dotRadius(n);
    const fsize  = Math.max(9, Math.min(14, radius * 0.7));
    const story  = findStoryForCluster(c);

    L.circleMarker([c.lat, c.lng], {
      radius,
      fillColor: '#E07B40',
      color: '#EDE8DF',
      weight: 0.6,
      fillOpacity: 0.62,
      interactive: false
    }).addTo(circleLayer);

    if (story) {
      const size = radius * 2;
      const halo = L.marker([c.lat, c.lng], {
        icon: L.divIcon({
          className: 'story-halo-icon',
          html: `<div class="halo-dot" style="width:${size}px;height:${size}px"></div>`,
          iconSize: [size, size],
          iconAnchor: [radius, radius]
        }),
        interactive: true,
        bubblingMouseEvents: false,
        keyboard: false
      });
      halo.on('click', function(e) {
        L.DomEvent.stopPropagation(e);
        openSheet(story);
      });
      halo.addTo(storyHaloLayer);
    }

    if (showLabels) {
      const size = radius * 2;
      L.marker([c.lat, c.lng], {
        icon: L.divIcon({
          className: 'count-label',
          html: `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-size:${fsize}px;">${n}</div>`,
          iconSize: [size, size],
          iconAnchor: [radius, radius]
        }),
        interactive: false
      }).addTo(labelLayer);
    }
  });
}

const overlay  = document.getElementById('sheet-overlay');
const closeBtn = document.getElementById('sheet-close-btn');
const locEl    = document.getElementById('sheet-loc-text');
const storyEl  = document.getElementById('sheet-story-text');

function openSheet(s) {
  locEl.textContent = s.location;
  storyEl.innerHTML = s.story;
  sheet.classList.add('open');
  overlay.classList.add('active');
}

function closeSheet() {
  sheet.classList.remove('open');
  overlay.classList.remove('active');
}

closeBtn.addEventListener('click', closeSheet);
overlay.addEventListener('click', closeSheet);
map.on('click', closeSheet);

buildMarkers();
map.on('zoomend', buildMarkers);

</script>
</body>
</html>
