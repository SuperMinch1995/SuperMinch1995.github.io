<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CIPO opening — silence to motion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --line-base: #3A2E2A;
  --line-accent: #C2510A;
  --text-color: #2C201C;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  overflow: hidden;
}
svg { display: block; width: 100%; height: 100%; }
.strand {
  fill: none;
  stroke: var(--line-base);
  stroke-width: 1.4;
  stroke-linecap: round;
}
.label {
  fill: var(--text-color);
  font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
  font-size: 19px;
  font-weight: 400;
  letter-spacing: 0.005em;
}
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
}
</style>
</head>
<body>
<h2 class="sr-only">An animated illustration: four parallel filaments oscillate, then one fragments, evoking how γ-2 actin dysfunction disrupts gut motility.</h2>
<svg id="stage" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <path class="strand" id="fa" opacity="0"/>
  <path class="strand" id="fb" opacity="0"/>
  <path class="strand" id="fc" opacity="0"/>
  <path class="strand" id="fd" opacity="0"/>
  <text class="label" id="t1" text-anchor="middle" dominant-baseline="middle" opacity="0">Your gut never stops moving.</text>
  <text class="label" id="t2" text-anchor="middle" dominant-baseline="middle" opacity="0">It needs a protein called γ-2 actin.</text>
</svg>
<script>
(function(){
  var svg = document.getElementById('stage');
  var paths = [
    document.getElementById('fa'),
    document.getElementById('fb'),
    document.getElementById('fc'),
    document.getElementById('fd')
  ];
  var t1 = document.getElementById('t1');
  var t2 = document.getElementById('t2');

  var W, H, cy, amp, offsets, chunks;
  var N = 120;
  var phases = [0, 0.45, 0.9, 1.35];
  var breakIdx = 1;
  var disp = [-1, 1, -1.2, 0.5, -0.85];

  function layout(){
    W = Math.max(window.innerWidth, 320);
    H = Math.max(window.innerHeight, 200);
    cy = H / 2;
    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);

    amp = Math.max(14, Math.min(22, H * 0.07));
    var spacing = Math.max(14, Math.min(28, H * 0.085));
    offsets = [-1.5*spacing, -0.5*spacing, 0.5*spacing, 1.5*spacing];

    chunks = [
      [0,        W*0.20],
      [W*0.20,   W*0.40],
      [W*0.40,   W*0.60],
      [W*0.60,   W*0.80],
      [W*0.80,   W]
    ];

    t1.setAttribute('x', W/2);
    t1.setAttribute('y', Math.max(40, H * 0.18));
    t2.setAttribute('x', W/2);
    t2.setAttribute('y', Math.min(H - 40, H * 0.82));
  }
  layout();
  window.addEventListener('resize', layout);

  function parseHex(h){
    h = h.trim().replace('#','');
    return [
      parseInt(h.slice(0,2),16),
      parseInt(h.slice(2,4),16),
      parseInt(h.slice(4,6),16)
    ];
  }
  var styles = getComputedStyle(document.documentElement);
  var baseRGB = parseHex(styles.getPropertyValue('--line-base'));
  var accentRGB = parseHex(styles.getPropertyValue('--line-accent'));

  var HOLD_AT = 8.0;
  var t0 = performance.now();
  var messagedT2 = false;
  var ease = function(x){ return x < 0.5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; };

  function tick(now){
    var e = (now - t0) / 1000;
    var t = Math.min(e, HOLD_AT);

    var lineOp = 0;
    if (t < 1.0) lineOp = 0;
    else if (t < 1.8) lineOp = (t - 1.0) / 0.8;
    else lineOp = 1;

    var t1Op = 0;
    if (t >= 2.0 && t < 2.5) t1Op = (t - 2.0) / 0.5;
    else if (t >= 2.5 && t < 4.5) t1Op = 1;
    else if (t >= 4.5 && t < 5.0) t1Op = 1 - (t - 4.5) / 0.5;

    var t2Op = 0;
    if (t >= 5.5 && t < 6.1) t2Op = (t - 5.5) / 0.6;
    else if (t >= 6.1) t2Op = 1;

    var mut = 0;
    if (t >= 5.5 && t < 7.5) mut = ease((t - 5.5) / 2.0);
    else if (t >= 7.5) mut = 1;

    var om = 1.2;
    var wavelength = Math.max(220, W * 0.36);

    for (var f = 0; f < 4; f++) {
      var ofY = cy + offsets[f];
      var ph = phases[f];
      var d = '';

      if (f !== breakIdx) {
        for (var i = 0; i < N; i++) {
          var x = i * W / (N - 1);
          var y = ofY + amp * Math.sin(2*Math.PI*x/wavelength - e*om + ph);
          d += (i ? 'L' : 'M') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
        }
        paths[f].setAttribute('d', d);
        paths[f].setAttribute('opacity', (lineOp * 0.78).toFixed(3));
      } else {
        var gap = mut * W * 0.012;
        for (var c = 0; c < chunks.length; c++) {
          var xs = chunks[c][0] + (c > 0 ? gap : 0);
          var xe = chunks[c][1] - (c < chunks.length - 1 ? gap : 0);
          var yShift = disp[c] * amp * 0.85 * mut;
          var started = false;
          for (var j = 0; j < N; j++) {
            var x2 = j * W / (N - 1);
            if (x2 < xs || x2 > xe) continue;
            var by = ofY + amp * Math.sin(2*Math.PI*x2/wavelength - e*om + ph);
            var y2 = by + yShift;
            d += (started ? 'L' : 'M') + x2.toFixed(1) + ',' + y2.toFixed(1) + ' ';
            started = true;
          }
        }
        paths[f].setAttribute('d', d);
        paths[f].setAttribute('opacity', lineOp.toFixed(3));
        var rr = Math.round(baseRGB[0] + (accentRGB[0] - baseRGB[0]) * mut);
        var gg = Math.round(baseRGB[1] + (accentRGB[1] - baseRGB[1]) * mut);
        var bb = Math.round(baseRGB[2] + (accentRGB[2] - baseRGB[2]) * mut);
        paths[f].style.stroke = 'rgb(' + rr + ',' + gg + ',' + bb + ')';
        paths[f].style.strokeWidth = (1.4 + mut * 0.9).toFixed(2);
      }
    }

    t1.setAttribute('opacity', t1Op.toFixed(3));
    t2.setAttribute('opacity', t2Op.toFixed(3));

    if (t >= 6.1 && !messagedT2) {
      messagedT2 = true;
      try {
        if (window.parent !== window) {
          window.parent.postMessage({ cipoOpeningTextReady: true }, '*');
        }
      } catch (_) {}
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
