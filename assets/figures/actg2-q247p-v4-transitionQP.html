<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACTG2 Q247P — Pédagogique</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cartoon:    #E8D2B0;
    --q-teal:     #1AAB8E;
    --p-orange:   #FF6B1A;
    --residue:    #FF6B1A;
    --cream:      #FCF9F1;
    --beige:      #F6F0E2;
    --beige-2:    #EFE7D6;
    --dark:       #4D4238;
    --muted:      rgba(77, 66, 56, 0.52);
    --muted-2:    rgba(77, 66, 56, 0.32);
    --line:       rgba(77, 66, 56, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    border-radius: 14px;
    overflow: hidden;
    background: var(--beige-2);
    box-shadow:
      0 1px 16px rgba(77, 66, 56, 0.06),
      inset 0 0 0 1px var(--line);
  }

  .help-row {
    display: flex;
    align-items: stretch;
    background: var(--cream);
    border-bottom: 1px solid var(--line);
  }
  .help-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    color: var(--muted);
  }
  .help-item + .help-item { border-left: 1px solid var(--line); }
  .help-icon-wrap {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: rgba(255, 107, 26, 0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .help-icon-wrap svg {
    width: 13px;
    height: 13px;
    color: var(--p-orange);
  }
  .help-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
    line-height: 1.2;
  }
  .help-verb {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.03em;
  }
  .help-hint {
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  #viewer-wrap {
    position: relative;
    width: 100%;
    height: 460px;
  }
  #mol-viewer { width: 100%; height: 100%; }

  #intro {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(239, 231, 214, 0.95);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 20;
    transition: opacity 1s ease;
    padding: 0 2rem;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  .intro-text {
    font-size: 1.2rem;
    font-weight: 300;
    text-align: center;
    max-width: 380px;
    line-height: 1.5;
  }
  .intro-text em {
    font-style: normal;
    color: var(--p-orange);
    font-weight: 500;
  }

  #mut-label {
    position: absolute;
    top: 28%;
    right: 11%;
    z-index: 15;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }
  #mut-label.visible { opacity: 1; transform: translateY(0); }
  .label-pill {
    background: rgba(252, 249, 241, 0.96);
    padding: 9px 14px 10px;
    border-radius: 8px;
    box-shadow:
      0 2px 12px rgba(77, 66, 56, 0.12),
      inset 0 0 0 1px rgba(255, 107, 26, 0.20);
    text-align: left;
    min-width: 180px;
  }
  .label-gene {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--p-orange);
    margin-bottom: 2px;
    font-weight: 500;
  }
  .label-desc {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .toolbar {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px;
    background: rgba(252, 249, 241, 0.92);
    border: 1px solid var(--line);
    border-radius: 999px;
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 10px rgba(77, 66, 56, 0.08);
    z-index: 30;
    opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .toolbar.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .tb-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .tb-btn:hover {
    background: var(--p-orange);
    color: #fff;
  }
  .tb-btn.active {
    background: var(--p-orange);
    color: #fff;
  }
  .tb-btn svg { width: 12px; height: 12px; }
  .tb-btn.tb-arrow { width: 28px; height: 28px; padding: 0; }
  .tb-btn.tb-text { padding: 6px 12px; }
  .tb-divider {
    width: 1px;
    height: 18px;
    background: var(--line);
    margin: 0 3px;
  }

  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 18px;
    background: var(--cream);
    border-top: 1px solid var(--line);
  }
  .meta-gene {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--p-orange);
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .meta-desc { font-size: 0.7rem; color: var(--muted); }
  .meta-tag {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--muted);
    border: 1px solid rgba(77, 66, 56, 0.10);
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--beige-2);
    z-index: 40;
    gap: 14px;
    transition: opacity 0.5s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--p-orange);
    display: inline-block;
    margin: 0 3px;
    animation: bounce 1.2s infinite ease-in-out both;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.30s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-7px); opacity: 1; }
  }
  .loader-txt {
    font-size: 0.66rem;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  @media (max-width: 640px) {
    #viewer-wrap { height: 360px; }
    .intro-text { font-size: 1.05rem; }
    #mut-label { top: 24%; right: 6%; }
    .label-pill { min-width: 150px; padding: 7px 11px 8px; }
    .meta { padding: 9px 12px; }
    .meta-desc { display: none; }
    .help-item { padding: 8px 9px; gap: 6px; }
    .help-icon-wrap { width: 22px; height: 22px; }
    .help-verb { font-size: 0.64rem; }
    .help-hint { font-size: 0.56rem; }
    .toolbar { gap: 2px; padding: 4px; }
    .tb-btn.tb-text { padding: 5px 9px; font-size: 0.64rem; }
    .tb-btn.tb-arrow { width: 24px; height: 24px; }
  }
</style>
</head>
<body>

<div class="hero">

  <div class="help-row">
    <div class="help-item">
      <div class="help-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/>
          <polyline points="21 3 21 8 16 8"/>
        </svg>
      </div>
      <div class="help-text">
        <div class="help-verb">Rotate</div>
        <div class="help-hint">Click and drag</div>
      </div>
    </div>
    <div class="help-item">
      <div class="help-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <div class="help-text">
        <div class="help-verb">Zoom</div>
        <div class="help-hint">Scroll wheel</div>
      </div>
    </div>
    <div class="help-item">
      <div class="help-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="5 9 2 12 5 15"/>
          <polyline points="9 5 12 2 15 5"/>
          <polyline points="15 19 12 22 9 19"/>
          <polyline points="19 9 22 12 19 15"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
        </svg>
      </div>
      <div class="help-text">
        <div class="help-verb">Pan</div>
        <div class="help-hint">Use arrow buttons below</div>
      </div>
    </div>
  </div>

  <div id="viewer-wrap">

    <div id="loader">
      <div>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
      <div class="loader-txt">LOADING STRUCTURE</div>
    </div>

    <div id="mol-viewer"></div>

    <div id="intro">
      <p class="intro-text">
        A <em>single mutation</em> can reshape a protein.
      </p>
    </div>

    <div id="mut-label">
      <div class="label-pill">
        <div class="label-gene">ACTG2 · Q247P</div>
      </div>
    </div>

    <div class="toolbar" id="toolbar">
      <button class="tb-btn tb-arrow" id="pan-up" aria-label="Pan up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="tb-btn tb-arrow" id="pan-left" aria-label="Pan left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="tb-btn tb-arrow" id="pan-down" aria-label="Pan down">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="tb-btn tb-arrow" id="pan-right" aria-label="Pan right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="tb-divider"></div>
      <button class="tb-btn tb-text" id="btn-recenter">⌂ Recenter</button>
      <div class="tb-divider"></div>
      <button class="tb-btn tb-text" id="btn-replay">↻ Replay</button>
    </div>

  </div>

  <div class="meta">
    <span class="meta-gene">ACTG2 · Q247P</span>
    <span class="meta-desc">γ-2 actin · smooth muscle isoform</span>
  </div>

</div>

<script>
(function () {

  const PDB_NORMAL  = '/assets/structures/Normal.pdb';
  const PDB_MUTANT  = '/assets/structures/Q247P.pdb';
  const MUT_RESI    = 245;
  const MUT_CHAIN   = 'A';
  const PAN_STEP    = 28;

  const COLOR_BG       = 0xEFE7D6;
  const COLOR_CARTOON  = '#E8D2B0';
  const COLOR_Q_TEAL   = '#1AAB8E';
  const COLOR_P_ORANGE = '#FF6B1A';

  const el = document.getElementById('mol-viewer');
  const viewer = $3Dmol.createViewer(el, {
    backgroundColor: COLOR_BG,
    antialias: true,
    cartoonQuality: 8
  });

  let spinning = false;
  let wobbling = false;
  let wobbleAnimId = null;
  let wobbleStart = 0;
  let wobbleLastAngle = 0;
  let timers = [];
  let modelsReady = false;

  // ── Style helpers ──

  function showWildType(opacity) {
    const op = (typeof opacity === 'number') ? opacity : 0.85;
    viewer.setStyle({ model: 0 }, {
      cartoon: { color: COLOR_CARTOON, opacity: op, thickness: 0.30 }
    });
    viewer.setStyle(
      { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        cartoon: { color: COLOR_Q_TEAL, opacity: 1.0, thickness: 0.40 },
        stick:   { color: COLOR_Q_TEAL, radius: 0.22, opacity: 1.0 },
        sphere:  { color: COLOR_Q_TEAL, radius: 0.55, opacity: 0.95 }
      }
    );
  }

  function showMutant(opacity) {
    const op = (typeof opacity === 'number') ? opacity : 0.85;
    viewer.setStyle({ model: 1 }, {
      cartoon: { color: COLOR_CARTOON, opacity: op, thickness: 0.30 }
    });
    viewer.setStyle(
      { model: 1, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        cartoon: { color: COLOR_P_ORANGE, opacity: 1.0, thickness: 0.40 },
        stick:   { color: COLOR_P_ORANGE, radius: 0.22, opacity: 1.0 },
        sphere:  { color: COLOR_P_ORANGE, radius: 0.55, opacity: 0.95 }
      }
    );
  }

  function showWildTypeCloseup() {
    viewer.setStyle({ model: 0 }, {
      cartoon: { color: COLOR_CARTOON, opacity: 0.10, thickness: 0.20 }
    });
    viewer.setStyle(
      { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        stick:  { color: COLOR_Q_TEAL, radius: 0.42, opacity: 1.0 },
        sphere: { color: COLOR_Q_TEAL, radius: 0.32, opacity: 0.85 }
      }
    );
  }

  function showMutantCloseup() {
    viewer.setStyle({ model: 1 }, {
      cartoon: { color: COLOR_CARTOON, opacity: 0.10, thickness: 0.20 }
    });
    viewer.setStyle(
      { model: 1, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        stick:  { color: COLOR_P_ORANGE, radius: 0.42, opacity: 1.0 },
        sphere: { color: COLOR_P_ORANGE, radius: 0.32, opacity: 0.85 }
      }
    );
  }

  function hideModel(idx) {
    viewer.setStyle({ model: idx }, {});
  }

  function pulseQ247() {
    viewer.setStyle(
      { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        cartoon: { color: COLOR_Q_TEAL, opacity: 1.0, thickness: 0.45 },
        stick:   { color: COLOR_Q_TEAL, radius: 0.26, opacity: 1.0 },
        sphere:  { color: COLOR_Q_TEAL, radius: 0.78, opacity: 1.0 }
      }
    );
    viewer.render();
    timers.push(setTimeout(() => {
      viewer.setStyle(
        { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
        {
          cartoon: { color: COLOR_Q_TEAL, opacity: 1.0, thickness: 0.40 },
          stick:   { color: COLOR_Q_TEAL, radius: 0.22, opacity: 1.0 },
          sphere:  { color: COLOR_Q_TEAL, radius: 0.55, opacity: 0.95 }
        }
      );
      viewer.render();
    }, 700));
  }

  // ── Wobble (Phase 3) ──
  function startWobble() {
    if (wobbling) return;
    wobbling = true;
    wobbleStart = performance.now();
    wobbleLastAngle = 0;
    function step(now) {
      if (!wobbling) return;
      const t = (now - wobbleStart) / 1000;
      const targetAngle = Math.sin(t * 1.3) * 1.8;
      const delta = targetAngle - wobbleLastAngle;
      viewer.rotate(delta, 'y');
      wobbleLastAngle = targetAngle;
      viewer.render();
      wobbleAnimId = requestAnimationFrame(step);
    }
    wobbleAnimId = requestAnimationFrame(step);
  }

  function stopWobble() {
    wobbling = false;
    if (wobbleAnimId) {
      cancelAnimationFrame(wobbleAnimId);
      wobbleAnimId = null;
    }
    if (wobbleLastAngle !== 0) {
      viewer.rotate(-wobbleLastAngle, 'y');
      wobbleLastAngle = 0;
      viewer.render();
    }
  }

  // ── Crossfade Q → P (Phase 4) ──
  function crossfadeToMutant() {
    stopWobble();

    viewer.setStyle(
      { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
      {
        stick:  { color: '#FFFFFF', radius: 0.55, opacity: 1.0 },
        sphere: { color: '#FFFFFF', radius: 0.45, opacity: 1.0 }
      }
    );
    viewer.render();

    timers.push(setTimeout(() => {
      hideModel(0);

      viewer.setStyle({ model: 1 }, {
        cartoon: { color: COLOR_CARTOON, opacity: 0.10, thickness: 0.20 }
      });
      viewer.setStyle(
        { model: 1, chain: MUT_CHAIN, resi: MUT_RESI },
        {
          stick:  { color: COLOR_P_ORANGE, radius: 0.58, opacity: 1.0 },
          sphere: { color: COLOR_P_ORANGE, radius: 0.45, opacity: 1.0 }
        }
      );
      viewer.render();

      timers.push(setTimeout(() => {
        viewer.setStyle(
          { model: 1, chain: MUT_CHAIN, resi: MUT_RESI },
          {
            stick:  { color: COLOR_P_ORANGE, radius: 0.42, opacity: 1.0 },
            sphere: { color: COLOR_P_ORANGE, radius: 0.32, opacity: 0.85 }
          }
        );
        viewer.render();
      }, 350));
    }, 250));
  }

  // ── Phase 5: Free exploration ──
  function enterFreeExploration() {
    showMutant();
    viewer.zoomTo({ model: 1, chain: MUT_CHAIN, resi: MUT_RESI }, 1200);
    viewer.zoom(0.6, 1200);

    document.getElementById('toolbar').classList.add('visible');
    document.getElementById('mut-label').classList.add('visible');
  }

  // ── Toolbar actions ──
  function clearTimers() {
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  function stopSpin() {
    if (spinning) {
      viewer.spin(false);
      spinning = false;
    }
  }

  function panView(dx, dy) {
    stopSpin();
    stopWobble();
    viewer.translate(dx, dy, 200);
  }

  function recenter() {
    stopSpin();
    stopWobble();
    const visibleModel = modelsReady ? (viewer.getModel(1) ? 1 : 0) : 0;
    viewer.zoomTo({ model: visibleModel, chain: MUT_CHAIN, resi: MUT_RESI }, 600);
    viewer.zoom(0.6, 600);
  }

  // ── Main narrative ──
  function startNarrative() {
    if (!modelsReady) return;
    clearTimers();
    stopSpin();
    stopWobble();

    document.getElementById('intro').classList.remove('hidden');
    document.getElementById('mut-label').classList.remove('visible');
    document.getElementById('toolbar').classList.remove('visible');

    showWildType();
    hideModel(1);
    viewer.zoomTo({ model: 0, chain: MUT_CHAIN, resi: MUT_RESI });
    viewer.zoom(0.6);
    viewer.render();

    // Phase 0 → 1 (t=2s): hide intro, slow rotation, discreet pulses
    timers.push(setTimeout(() => {
      document.getElementById('intro').classList.add('hidden');
      viewer.spin('y', 0.4);
      spinning = true;
      timers.push(setTimeout(pulseQ247, 800));
      timers.push(setTimeout(pulseQ247, 2200));
    }, 2000));

    // Phase 2 (t=5s): cartoon dims, gradual zoom
    timers.push(setTimeout(() => {
      stopSpin();
      viewer.setStyle({ model: 0 }, {
        cartoon: { color: COLOR_CARTOON, opacity: 0.25, thickness: 0.28 }
      });
      viewer.setStyle(
        { model: 0, chain: MUT_CHAIN, resi: MUT_RESI },
        {
          cartoon: { color: COLOR_Q_TEAL, opacity: 1.0, thickness: 0.40 },
          stick:   { color: COLOR_Q_TEAL, radius: 0.22, opacity: 1.0 },
          sphere:  { color: COLOR_Q_TEAL, radius: 0.55, opacity: 0.95 }
        }
      );
      viewer.zoomTo({ model: 0, chain: MUT_CHAIN, resi: MUT_RESI }, 1500);
      viewer.zoom(1.4, 1500);
      viewer.render();
    }, 5000));

    // Phase 3 (t=7s): close-up, then wobble starts
    timers.push(setTimeout(() => {
      showWildTypeCloseup();
      viewer.zoom(1.5, 1000);
      viewer.render();
      timers.push(setTimeout(startWobble, 1100));
    }, 7000));

    // Phase 4 (t=10s): crossfade Q → P
    timers.push(setTimeout(crossfadeToMutant, 10000));

    // Phase 5 (t=11.5s): free exploration
    timers.push(setTimeout(enterFreeExploration, 11500));
  }

  // ── Load both PDBs in parallel ──
  Promise.all([
    fetch(PDB_NORMAL).then(r => {
      if (!r.ok) throw new Error('Normal.pdb not found at ' + PDB_NORMAL);
      return r.text();
    }),
    fetch(PDB_MUTANT).then(r => {
      if (!r.ok) throw new Error('Q247P.pdb not found at ' + PDB_MUTANT);
      return r.text();
    })
  ])
    .then(([normalPdb, mutantPdb]) => {
      viewer.addModel(normalPdb, 'pdb');   // model 0 = wild-type
      viewer.addModel(mutantPdb, 'pdb');   // model 1 = mutant
      modelsReady = true;

      showWildType();
      hideModel(1);
      viewer.zoomTo({ model: 0, chain: MUT_CHAIN, resi: MUT_RESI });
      viewer.zoom(0.6);
      viewer.render();

      document.getElementById('loader').classList.add('hidden');
      startNarrative();
    })
    .catch(err => {
      console.error('PDB load failed:', err);
      document.getElementById('loader').innerHTML =
        '<div style="color:#FF6B1A;font-size:0.7rem;letter-spacing:0.1em">STRUCTURE UNAVAILABLE</div>';
    });

  // ── Event listeners ──
  document.getElementById('btn-replay').addEventListener('click', startNarrative);
  document.getElementById('btn-recenter').addEventListener('click', recenter);

  document.getElementById('pan-up').addEventListener('click',    () => panView(0, -PAN_STEP));
  document.getElementById('pan-down').addEventListener('click',  () => panView(0,  PAN_STEP));
  document.getElementById('pan-left').addEventListener('click',  () => panView( PAN_STEP, 0));
  document.getElementById('pan-right').addEventListener('click', () => panView(-PAN_STEP, 0));

  el.addEventListener('mousedown', () => { stopSpin(); stopWobble(); });
  el.addEventListener('touchstart', () => { stopSpin(); stopWobble(); }, { passive: true });

})();
</script>
</body>
</html>
