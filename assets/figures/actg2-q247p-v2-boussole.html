<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACTG2 Q247P — Boussole</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:        #C68A4A;   /* warm ochre */
    --orange-deep:   #A06A2E;
    --orange-soft:   #E2B888;
    --residue:       #C2510A;   /* keep punch on the residue itself */
    --residue-deep:  #9E4218;
    --cream:         #FCF8EE;
    --beige:         #F5EFE0;
    --beige-2:       #EDE5D2;
    --dark:          #4D4238;
    --muted:         rgba(77, 66, 56, 0.50);
    --muted-2:       rgba(77, 66, 56, 0.30);
    --line:          rgba(77, 66, 56, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: transparent;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--dark);
    -webkit-font-smoothing: antialiased;
  }

  .hero {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    border-radius: 14px;
    overflow: hidden;
    background: var(--beige-2);
    box-shadow:
      0 1px 16px rgba(77, 66, 56, 0.06),
      inset 0 0 0 1px var(--line);
  }

  #viewer-wrap {
    position: relative;
    width: 100%;
    height: 480px;
  }
  #mol-viewer { width: 100%; height: 100%; }

  /* ─── Phase 1: intro ─── */
  #intro {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(237, 229, 210, 0.62);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 20;
    transition: opacity 1s ease;
    padding: 0 2rem;
  }
  #intro.hidden { opacity: 0; pointer-events: none; }
  .intro-text {
    font-size: 1.2rem;
    font-weight: 300;
    text-align: center;
    max-width: 380px;
    line-height: 1.5;
  }
  .intro-text em {
    font-style: normal;
    color: var(--residue);
    font-weight: 500;
  }

  /* ─── Phase 2: mutation label ─── */
  #mut-label {
    position: absolute;
    top: 28%;
    right: 11%;
    z-index: 15;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    pointer-events: none;
  }
  #mut-label.visible { opacity: 1; transform: translateY(0); }
  .label-pill {
    background: rgba(252, 248, 238, 0.96);
    padding: 9px 14px 10px;
    border-radius: 8px;
    box-shadow:
      0 2px 12px rgba(77, 66, 56, 0.12),
      inset 0 0 0 1px rgba(194, 81, 10, 0.18);
    text-align: left;
    min-width: 180px;
  }
  .label-gene {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--residue);
    margin-bottom: 2px;
    font-weight: 500;
  }
  .label-desc {
    font-size: 0.72rem;
    color: var(--muted);
    line-height: 1.4;
  }

  /* ─── Phase 3a: Onboarding chips (sequential, fading) ─── */
  .onb-chip {
    position: absolute;
    z-index: 22;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    background: rgba(252, 248, 238, 0.95);
    border: 1px solid var(--line);
    border-radius: 999px;
    box-shadow: 0 2px 10px rgba(77, 66, 56, 0.08);
    backdrop-filter: blur(6px);
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }
  .onb-chip.visible { opacity: 1; transform: scale(1); }
  .onb-chip svg {
    width: 13px;
    height: 13px;
    color: var(--orange);
    flex-shrink: 0;
  }
  .onb-chip .verb {
    font-size: 0.66rem;
    font-weight: 600;
    color: var(--dark);
    letter-spacing: 0.04em;
  }
  .onb-chip .hint {
    font-size: 0.64rem;
    color: var(--muted);
    margin-left: 1px;
  }
  #chip-rotate {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.94);
  }
  #chip-rotate.visible {
    transform: translate(-50%, -50%) scale(1);
  }
  #chip-zoom {
    bottom: 60px;
    left: 18px;
  }
  #chip-pan {
    bottom: 86px;
    right: 18px;
  }

  /* ─── Help button (top-right, recalls hints) ─── */
  #btn-help {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(252, 248, 238, 0.92);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 30;
    opacity: 0;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }
  #btn-help.visible { opacity: 1; }
  #btn-help:hover {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* ─── Phase 3b: Compass pan widget (bottom-right) ─── */
  #compass {
    position: absolute;
    bottom: 14px;
    right: 14px;
    width: 88px;
    height: 88px;
    z-index: 30;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  #compass.visible { opacity: 1; transform: scale(1); }
  .compass-bg {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(252, 248, 238, 0.85);
    border: 1px solid var(--line);
    backdrop-filter: blur(6px);
    box-shadow: 0 2px 12px rgba(77, 66, 56, 0.08);
  }
  .compass-btn {
    position: absolute;
    width: 26px;
    height: 26px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: all 0.15s ease;
    padding: 0;
  }
  .compass-btn svg { width: 13px; height: 13px; }
  .compass-btn:hover { color: var(--orange); background: rgba(198, 138, 74, 0.12); }
  .compass-up    { top: 4px;   left: 50%; transform: translateX(-50%); }
  .compass-down  { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .compass-left  { left: 4px;   top: 50%;  transform: translateY(-50%); }
  .compass-right { right: 4px;  top: 50%;  transform: translateY(-50%); }
  .compass-center {
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 22px; height: 22px;
    border: 1px solid var(--line);
    color: var(--muted-2);
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
  }
  .compass-center:hover {
    border-color: var(--orange);
    color: var(--orange);
    background: rgba(198, 138, 74, 0.10);
  }

  /* ─── Replay + Surface (bottom-left) ─── */
  #controls {
    position: absolute;
    bottom: 14px;
    left: 14px;
    display: flex;
    gap: 6px;
    z-index: 30;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #controls.visible { opacity: 1; transform: translateY(0); }
  .ctrl {
    background: rgba(252, 248, 238, 0.92);
    border: 1px solid var(--line);
    color: var(--dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.18s ease;
    backdrop-filter: blur(4px);
  }
  .ctrl:hover, .ctrl.active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }

  /* ─── Meta ─── */
  .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 11px 18px;
    background: var(--cream);
    border-top: 1px solid var(--line);
  }
  .meta-gene {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--residue);
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .meta-desc { font-size: 0.7rem; color: var(--muted); }
  .meta-tag {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    color: var(--muted);
    border: 1px solid rgba(77, 66, 56, 0.10);
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* ─── Loader ─── */
  #loader {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--beige-2);
    z-index: 40;
    gap: 14px;
    transition: opacity 0.5s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--orange);
    display: inline-block;
    margin: 0 3px;
    animation: bounce 1.2s infinite ease-in-out both;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.30s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40%           { transform: translateY(-7px); opacity: 1; }
  }
  .loader-txt {
    font-size: 0.66rem;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  /* ─── Mobile ─── */
  @media (max-width: 640px) {
    #viewer-wrap { height: 380px; }
    .intro-text { font-size: 1.05rem; }
    #mut-label { top: 24%; right: 6%; }
    .label-pill { min-width: 150px; padding: 7px 11px 8px; }
    .meta { padding: 9px 12px; }
    .meta-desc { display: none; }
    #compass { width: 76px; height: 76px; }
  }
</style>
</head>
<body>

<div class="hero">

  <div id="viewer-wrap">

    <div id="loader">
      <div>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
      <div class="loader-txt">LOADING STRUCTURE</div>
    </div>

    <div id="mol-viewer"></div>

    <!-- Intro -->
    <div id="intro">
      <p class="intro-text">
        A <em>single mutation</em> can reshape a protein.
      </p>
    </div>

    <!-- Mutation label -->
    <div id="mut-label">
      <div class="label-pill">
        <div class="label-gene">ACTG2 · Q247P</div>
        <div class="label-desc">Severe CIPO phenotype</div>
      </div>
    </div>

    <!-- Sequential onboarding chips -->
    <div class="onb-chip" id="chip-rotate">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3-6.7L21 8"/>
        <polyline points="21 3 21 8 16 8"/>
      </svg>
      <span class="verb">Rotate</span><span class="hint">drag</span>
    </div>
    <div class="onb-chip" id="chip-zoom">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <span class="verb">Zoom</span><span class="hint">scroll</span>
    </div>
    <div class="onb-chip" id="chip-pan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 9 2 12 5 15"/>
        <polyline points="9 5 12 2 15 5"/>
        <polyline points="15 19 12 22 9 19"/>
        <polyline points="19 9 22 12 19 15"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <line x1="12" y1="2" x2="12" y2="22"/>
      </svg>
      <span class="verb">Pan</span><span class="hint">arrows</span>
    </div>

    <!-- Help button -->
    <button id="btn-help" aria-label="Show navigation hints">?</button>

    <!-- Compass pan widget -->
    <div id="compass">
      <div class="compass-bg"></div>
      <button class="compass-btn compass-up" aria-label="Pan up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="compass-btn compass-left" aria-label="Pan left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="compass-btn compass-center" aria-label="Recenter">⌂</button>
      <button class="compass-btn compass-right" aria-label="Pan right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="compass-btn compass-down" aria-label="Pan down">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>

    <!-- Replay + Surface -->
    <div id="controls">
      <button class="ctrl" id="btn-replay">↻ Replay</button>
      <button class="ctrl" id="btn-surface">◈ Surface</button>
    </div>

  </div>

  <div class="meta">
    <span class="meta-gene">ACTG2 · Q247P</span>
    <span class="meta-desc">γ-2 actin · smooth muscle isoform</span>
    <span class="meta-tag">AlphaFold · Chain A</span>
  </div>

</div>

<script>
(function () {

  const PDB_PATH    = '/assets/structures/Q247P.txt';
  const MUT_RESI    = 245;
  const MUT_CHAIN   = 'A';
  const PAN_STEP    = 28;

  const COLOR_BG     = 0xEDE5D2;
  const COLOR_MAIN   = '#7A6856';
  const COLOR_NEAR   = '#A87B58';
  const COLOR_SPHERE = '#C2510A';
  const COLOR_STICK  = '#9E4218';

  const el = document.getElementById('mol-viewer');
  const viewer = $3Dmol.createViewer(el, {
    backgroundColor: COLOR_BG,
    antialias: true,
    cartoonQuality: 8
  });

  let spinning = false;
  let surfaceOn = false;
  let surfaceId = null;
  let timers = [];

  function applyBaseStyle() {
    viewer.setStyle({}, {
      cartoon: { color: COLOR_MAIN, opacity: 0.65, thickness: 0.30 }
    });
    viewer.setStyle(
      { chain: MUT_CHAIN, resi: (MUT_RESI - 4) + '-' + (MUT_RESI + 4) },
      { cartoon: { color: COLOR_NEAR, opacity: 0.84, thickness: 0.34 } }
    );
    viewer.setStyle(
      { chain: MUT_CHAIN, resi: MUT_RESI },
      {
        sphere: { color: COLOR_SPHERE, radius: 0.65, opacity: 0.95 },
        stick:  { color: COLOR_STICK,  radius: 0.18, opacity: 1.0  }
      }
    );
  }

  function pulseResidue() {
    viewer.setStyle(
      { chain: MUT_CHAIN, resi: MUT_RESI },
      {
        sphere: { color: COLOR_SPHERE, radius: 0.95, opacity: 1.0 },
        stick:  { color: COLOR_STICK,  radius: 0.22, opacity: 1.0 }
      }
    );
    viewer.render();
    setTimeout(() => {
      viewer.setStyle(
        { chain: MUT_CHAIN, resi: MUT_RESI },
        {
          sphere: { color: COLOR_SPHERE, radius: 0.65, opacity: 0.95 },
          stick:  { color: COLOR_STICK,  radius: 0.18, opacity: 1.0  }
        }
      );
      viewer.render();
    }, 700);
  }

  function clearTimers() {
    timers.forEach(t => clearTimeout(t));
    timers = [];
  }

  function stopSpin() {
    if (spinning) { viewer.spin(false); spinning = false; }
  }

  function panView(dx, dy) {
    stopSpin();
    viewer.translate(dx, dy, 200);
  }

  function recenter() {
    stopSpin();
    viewer.zoomTo({ chain: MUT_CHAIN, resi: MUT_RESI }, 600);
    viewer.zoom(0.6, 600);
  }

  // Chips show one after the other, then fade out
  function showOnboardingSequence() {
    const rotate = document.getElementById('chip-rotate');
    const zoom   = document.getElementById('chip-zoom');
    const pan    = document.getElementById('chip-pan');

    timers.push(setTimeout(() => rotate.classList.add('visible'),    0));
    timers.push(setTimeout(() => rotate.classList.remove('visible'), 2200));

    timers.push(setTimeout(() => zoom.classList.add('visible'),     2400));
    timers.push(setTimeout(() => zoom.classList.remove('visible'),  4600));

    timers.push(setTimeout(() => pan.classList.add('visible'),      4800));
    timers.push(setTimeout(() => pan.classList.remove('visible'),   7200));
  }

  function startNarrative() {
    clearTimers();

    document.getElementById('intro').classList.remove('hidden');
    document.getElementById('mut-label').classList.remove('visible');
    document.getElementById('compass').classList.remove('visible');
    document.getElementById('controls').classList.remove('visible');
    document.getElementById('btn-help').classList.remove('visible');
    document.querySelectorAll('.onb-chip').forEach(c => c.classList.remove('visible'));

    applyBaseStyle();
    viewer.zoomTo({ chain: MUT_CHAIN, resi: MUT_RESI });
    viewer.zoom(0.6);
    viewer.spin(false);
    spinning = false;
    viewer.render();

    timers.push(setTimeout(() => {
      document.getElementById('intro').classList.add('hidden');
      viewer.spin('y', 0.4);
      spinning = true;
    }, 2000));

    timers.push(setTimeout(() => {
      pulseResidue();
      document.getElementById('mut-label').classList.add('visible');
    }, 4000));

    timers.push(setTimeout(() => {
      stopSpin();
      viewer.zoomTo({ chain: MUT_CHAIN, resi: MUT_RESI }, 1000);
    }, 6500));

    timers.push(setTimeout(() => {
      document.getElementById('compass').classList.add('visible');
      document.getElementById('controls').classList.add('visible');
      document.getElementById('btn-help').classList.add('visible');
      showOnboardingSequence();
    }, 8000));
  }

  fetch(PDB_PATH)
    .then(r => { if (!r.ok) throw new Error('PDB not found'); return r.text(); })
    .then(pdb => {
      viewer.addModel(pdb, 'pdb');
      applyBaseStyle();
      viewer.zoomTo({ chain: MUT_CHAIN, resi: MUT_RESI });
      viewer.zoom(0.6);
      viewer.render();
      document.getElementById('loader').classList.add('hidden');
      startNarrative();
    })
    .catch(err => {
      console.error('PDB load failed:', err);
      document.getElementById('loader').innerHTML =
        '<div style="color:#C68A4A;font-size:0.7rem;letter-spacing:0.1em">STRUCTURE UNAVAILABLE</div>';
    });

  document.getElementById('btn-replay').addEventListener('click', startNarrative);
  document.getElementById('btn-help').addEventListener('click', showOnboardingSequence);

  document.getElementById('btn-surface').addEventListener('click', function () {
    surfaceOn = !surfaceOn;
    if (surfaceOn) {
      surfaceId = viewer.addSurface($3Dmol.SurfaceType.MS, {
        opacity: 0.18, color: '#C68A4A'
      }, { chain: MUT_CHAIN });
      viewer.render();
      this.classList.add('active');
    } else {
      if (surfaceId !== null) viewer.removeSurface(surfaceId);
      viewer.render();
      this.classList.remove('active');
    }
  });

  document.querySelector('.compass-up').addEventListener('click',    () => panView(0, -PAN_STEP));
  document.querySelector('.compass-down').addEventListener('click',  () => panView(0,  PAN_STEP));
  document.querySelector('.compass-left').addEventListener('click',  () => panView(-PAN_STEP, 0));
  document.querySelector('.compass-right').addEventListener('click', () => panView( PAN_STEP, 0));
  document.querySelector('.compass-center').addEventListener('click', recenter);

  el.addEventListener('mousedown', stopSpin);
  el.addEventListener('touchstart', stopSpin, { passive: true });

})();
</script>
</body>
</html>
