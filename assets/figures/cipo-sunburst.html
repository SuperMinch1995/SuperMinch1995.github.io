<title>CIPO — Genetic diagnosis sunburst</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{--sb-bg:#FAF7F2;--sb-bg2:#F0EBE4;--sb-bg3:#E8E2DA;--sb-text:#1a1612;--sb-text2:#4a4540;--sb-border:#E0D8CE;--sb-orange:#C2510A;}

body{font-family:'DM Sans',sans-serif;background:transparent;padding:1.5rem 15% 2rem;margin:0;}
.sb-root{font-family:'DM Sans',sans-serif;background:transparent;border:none;padding:0;max-width:100%;width:100%;}

/* Titre — même style que cipo-subline */
.sb-headline{font-size:1.15em;font-weight:400;color:var(--sb-text);line-height:1.6;text-align:center;margin:0 auto 2.5rem;max-width:836px;}

/* Stats row identique à cipo-stats-row */
.sb-stats-row{display:flex;justify-content:center;gap:3rem;margin:0 0 4.375rem;flex-wrap:wrap;max-width:836px;margin-left:auto;margin-right:auto;}
.sb-stat{display:flex;flex-direction:column;gap:0.15rem;align-items:center;}
.sb-stat-num{font-size:2em;font-weight:700;color:#C2510A;line-height:1;}
.sb-stat-lbl{font-size:0.88em;color:var(--sb-text2);letter-spacing:0.04em;text-align:center;}

/* Layout */
.sb-top{display:flex;gap:25px;align-items:flex-start;flex-wrap:wrap;max-width:836px;margin:0 auto;}
.sb-chart{flex-shrink:0;position:sticky;top:1.5rem;align-self:flex-start;margin-top:2rem;margin-left:60px;}
.sb-panel{flex:1;min-width:200px;}

.idle-hint{font-size:0.88em;font-style:italic;color:var(--sb-text2);margin-bottom:8px;opacity:0.85;}
.detail-area{border-top:none;padding-top:14px;min-height:400px;}
.detail-content{display:none;}
.detail-content.visible{display:block;}
.cat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:12px;border:none;letter-spacing:0.02em;}.cat-badge::before{content:"";display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.5);flex-shrink:0;}
.detail-desc{font-size:13px;color:var(--sb-text);line-height:1.65;margin-bottom:12px;}
.gene-grid{display:flex;flex-direction:column;gap:4px;}
.gene-hint{display:flex;align-items:center;gap:6px;justify-content:flex-start;margin:6px 0 -8px 8px;height:36px;pointer-events:none;position:relative;z-index:10;}
.gene-hint-text{font-size:0.82em;font-style:italic;color:var(--sb-text2);opacity:0.85;}
.gene-hint-arrow{width:50px;height:40px;display:block;}
.gene-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:var(--sb-bg2);cursor:pointer;transition:background .12s;}
.gene-row:hover{background:var(--sb-bg3);}
.gene-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.gene-name{font-size:12px;font-weight:400;color:var(--sb-text);font-style:italic;flex:1;}
.gene-n{font-size:11px;color:var(--sb-text2);}
.gene-pct{font-size:11px;color:var(--sb-text2);}
.gene-detail{display:none;padding:8px 10px 10px;margin-bottom:4px;background:var(--sb-bg);border-radius:0 0 7px 7px;border:0.5px solid var(--sb-border);border-top:none;}
.gene-detail.open{display:block;}
.gd-row{display:flex;gap:6px;margin-bottom:7px;align-items:baseline;}
.gd-label{font-size:10px;font-weight:500;color:var(--sb-text2);text-transform:uppercase;letter-spacing:.05em;min-width:72px;flex-shrink:0;}
.gd-val{font-size:11px;color:var(--sb-text);line-height:1.5;}
.gd-table{width:100%;border-collapse:collapse;font-size:10.5px;margin-top:2px;}
.gd-table th{font-size:10px;font-weight:500;color:var(--sb-text2);padding:3px 6px 4px;border-bottom:1px solid var(--sb-border);text-align:left;}
.gd-table td{padding:3px 6px;vertical-align:top;color:var(--sb-text);line-height:1.45;border-bottom:0.5px solid var(--sb-border);}
.gd-table tr:last-child td{border-bottom:none;}
.gd-table td:first-child{border-right:0.5px solid var(--sb-border);width:50%;}
.gd-refs{display:flex;flex-direction:column;gap:2px;}
.gd-refs a{font-size:11px;color:var(--sb-text);text-decoration:none;}
.gd-refs a:hover{color:var(--sb-text2);}
.sb-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--sb-border);}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sb-text2);cursor:pointer;padding:3px 7px 3px 4px;border-radius:5px;transition:all .12s;}
.leg-item:hover{background:var(--sb-bg2);}
.leg-item.dim{opacity:0.28;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
path.arc{cursor:pointer;transition:opacity .15s;}
path.arc:hover{filter:brightness(1.18);}
.sb-panel{position:relative;}
.crayon-arrow-wrap{
  position:absolute;
  top:30px;
  left:445px;
  width:90px;
  height:48px;
  pointer-events:none;
  z-index:5;
}
.crayon-arrow{width:90px;height:48px;display:block;}

/* Mobile responsive */
@media (max-width: 768px) {
  body{padding:1rem 1rem 1.5rem;}
  .sb-top{flex-direction:column;gap:1rem;align-items:center;}
  .sb-chart{position:static;margin:0 auto;width:100%;max-width:340px;display:flex;justify-content:center;}
  .sb-chart svg{width:100%;height:auto;max-width:340px;}
  .sb-panel{width:100%;min-width:0;flex:none;}
  .crayon-arrow-wrap{display:none !important;}
  .sb-stats-row{gap:1.5rem;margin-bottom:2rem;}
  .sb-stat-num{font-size:1.6em;}
  .sb-headline{font-size:1em;margin-bottom:1.5rem;}
  .sb-crayon-arrow-gap{display:none;}
}

.sb-top{position:relative;}
.sb-crayon-arrow-gap{
  position:absolute;
  left:-48px;
  top:0px;
  width:44px;
  height:100%;
  display:flex;
  align-items:flex-start;
  padding-top:4px;
  pointer-events:none;
}
</style>
</head>

        fullName: 'Pogo Transposable Element Derived with ZNF Domain',
        protein: 'POGZ chromatin regulator',
        function: 'Chromatin remodelling; transcriptional regulation in neurons',
        syndromesPresent: ['White-Sutton syndrome (WHSUS)'],
        syndromesAbsent:  [],
        notes: '',
        refs: [
          { label:'White et al., Genome Med 2016', url:'https://pubmed.ncbi.nlm.nih.gov/26739155/' },
          { label:'Stessman et al., Am J Hum Genet 2016', url:'https://pubmed.ncbi.nlm.nih.gov/26942287/' },
          { label:'Tan et al., J Hum Genet 2016', url:'https://pubmed.ncbi.nlm.nih.gov/26763881/' },
          { label:'Dentici et al., Am J Med Genet 2017', url:'https://pubmed.ncbi.nlm.nih.gov/28543742/' },
          { label:'GeneReviews White-Sutton syndrome', url:'https://www.ncbi.nlm.nih.gov/books/NBK573972/' },
        ]
      },
    ]
  },
];

const W = 290, H = 290, cx = 145, cy = 145;
const outerR     = 185;
const geneWidth  = 68;
const gap        = 3;
const catWidth   = 32;
const geneInnerR = outerR - geneWidth;
const geneOuterR = outerR;
const catOuterR  = geneInnerR - gap;
const catInnerR  = catOuterR - catWidth;
const holeR      = catInnerR - 3;

const svg = d3.select('#sbsvg');
const defs = svg.append('defs');
const g = svg.append('g').attr('transform', `translate(${cx},${cy})`);

const catTotals = categories.map(c => ({ ...c, total: d3.sum(c.genes, gg => gg.n) }));
const catPie = d3.pie().value(d => d.total).sort(null).padAngle(0.028)(catTotals);
const catArcFn = d3.arc().innerRadius(catInnerR).outerRadius(catOuterR).padAngle(0.028).cornerRadius(2);

let selected = null;
const allArcs = [];

function makeArcPath(r, sa, ea, ccw) {
  const x1 = Math.sin(sa)*r, y1 = -Math.cos(sa)*r;
  const x2 = Math.sin(ea)*r, y2 = -Math.cos(ea)*r;
  const diff = ccw ? (sa - ea + 2*Math.PI) % (2*Math.PI) : (ea - sa + 2*Math.PI) % (2*Math.PI);
  const large = diff > Math.PI ? 1 : 0;
  const sweep = ccw ? 0 : 1;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} ${sweep} ${x2} ${y2}`;
}

catPie.forEach((catSlice, ci) => {
  const cat = catSlice.data;
  const col = PALETTE[cat.name];
  const sa = catSlice.startAngle, ea = catSlice.endAngle;
  const span = ea - sa, midA = (sa + ea) / 2;

  const catPath = g.append('path').datum({ cat, type:'inner' })
    .attr('class','arc').attr('d', catArcFn(catSlice))
    .attr('fill', col.fill).attr('opacity', 1)
    .on('click', () => toggleCat(cat.name));
  allArcs.push(catPath);

  if (span > 0.18) {
    const labelR = (catInnerR + catOuterR) / 2 + 0.5;
    const pathId = `cp-${ci}`;
    const isBottom = midA > Math.PI * 0.6 && midA < Math.PI * 1.4;
    let pathD;
    if (isBottom) {
      pathD = makeArcPath(labelR, ea, sa, true);
    } else {
      pathD = makeArcPath(labelR, sa, ea, false);
    }
    defs.append('path').attr('id', pathId).attr('d', pathD);
    g.append('text')
      .attr('font-family', "'DM Sans',sans-serif")
      .attr('font-size', span > 1.1 ? 11 : span > 0.6 ? 10 : 9)
      .attr('font-weight', 500).attr('fill','#fff').attr('pointer-events','none')
      .append('textPath')
        .attr('href', `#${pathId}`).attr('startOffset','50%')
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .text(col.short);
  }

  const genePie = d3.pie().value(d => d.n).sort(null).padAngle(0.014)(cat.genes);
  genePie.forEach(gs => {
    const gsa = sa + (gs.startAngle / (2*Math.PI)) * span;
    const gea = sa + (gs.endAngle   / (2*Math.PI)) * span;
    const fakeSlice = { startAngle: gsa, endAngle: gea };
    const geneArcFn = d3.arc().innerRadius(geneInnerR).outerRadius(geneOuterR).padAngle(0.014).cornerRadius(2);

    const genePath = g.append('path').datum({ cat, gene: gs.data, type:'outer' })
      .attr('class','arc').attr('d', geneArcFn(fakeSlice))
      .attr('fill', col.fillOuter).attr('opacity', 1)
      .on('click', () => toggleCat(cat.name));
    allArcs.push(genePath);

    if (gs.data.n >= 3) {
      const gSpan = gea - gsa, gMid = (gsa + gea) / 2;
      const rg = (geneInnerR + geneOuterR) / 2;
      const lx = Math.sin(gMid) * rg;
      const ly = -Math.cos(gMid) * rg;
      g.append('text')
        .attr('transform', `translate(${lx},${ly})`)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('font-family', "'DM Sans',sans-serif")
        .attr('font-size', gSpan > 0.28 ? 11 : gSpan > 0.14 ? 10 : 8.5)
        .attr('font-weight', 400).attr('font-style','italic')
        .attr('fill','#fff').attr('pointer-events','none')
        .text(gs.data.gene === 'mt-DNADEL' ? 'mt-DNA del.' : gs.data.gene);
    }
  });
});

const centerG = g.append('g');
centerG.append('circle').attr('r', holeR).attr('fill','transparent');

const cNum = centerG.append('text')
  .attr('text-anchor','middle').attr('dy','-8')
  .attr('font-family',"'DM Sans',sans-serif").attr('font-size', 36).attr('font-weight', 700)
  .attr('fill','#C2510A').text('65');

const cSub = centerG.append('text')
  .attr('text-anchor','middle').attr('dy','6')
  .attr('font-family',"'DM Sans',sans-serif").attr('font-size', 12).attr('font-weight', 400)
  .attr('fill','#9b8f84').text('patients');

const cLbl = centerG.append('text')
  .attr('text-anchor','middle').attr('dy','22')
  .attr('font-family',"'DM Sans',sans-serif").attr('font-size', 9).attr('fill','#9b8f84')
  .text('');

const legendEl = document.getElementById('sb-legend');

function toggleCat(name) {
  const arrow = document.getElementById('crayonArrow');
  if (arrow) { arrow.style.transition = 'opacity 0.3s'; arrow.style.opacity = '0'; setTimeout(() => arrow.remove(), 350); }
  if (selected === name) {
    selected = null;
    allArcs.forEach(p => p.attr('opacity', 1));
    cNum.text('65');
    cSub.text('patients');
    cLbl.attr('font-size', 9).text('');
    document.getElementById('detail-content').classList.remove('visible');
    document.querySelectorAll('.leg-item').forEach(el => el.classList.remove('dim'));
  } else {
    selected = name;
    const cat = categories.find(c => c.name === name);
    const col = PALETTE[name];
    allArcs.forEach(p => {
      const d = p.datum();
      p.attr('opacity', d && d.cat && d.cat.name === name ? 1 : 0.1);
    });
    const tot = d3.sum(cat.genes, gg => gg.n);
    cNum.text(tot);
    cSub.text('patients');
    const geneCount = cat.genes.filter(g => g.gene !== 'mt-DNADEL').length;
    cLbl.attr('font-size', 9).text(geneCount === 1 ? '1 gene' : geneCount + ' genes');

    document.getElementById('detail-content').classList.add('visible');

    const geneHint = document.getElementById('geneHint');
    if (geneHint) {
      geneHint.style.transition = 'none';
      geneHint.style.opacity = '1';
      const oldSvg = geneHint.querySelector('svg');
      const newSvg = oldSvg.cloneNode(true);
      oldSvg.replaceWith(newSvg);
    }

    const badge = document.getElementById('det-badge');
    badge.textContent = name;
    badge.style.background = col.fill;
    badge.style.color = '#ffffff';

    document.getElementById('det-desc').textContent = cat.desc;

    const gGrid = document.getElementById('det-genes');
    gGrid.innerHTML = '';
    cat.genes.forEach(gene => {
      const pct = Math.round(gene.n / TOTAL * 100);
      const row = document.createElement('div');
      row.className = 'gene-row';
      row.style.borderRadius = '7px 7px 7px 7px';
      row.innerHTML = `<span class="gene-dot" style="background:${col.fill}"></span><span class="gene-name">${gene.gene === 'mt-DNADEL' ? 'mt-DNA deletions' : gene.gene}</span><span class="gene-n">n=${gene.n}</span><span class="gene-pct"> ${pct}%</span>`;

      const detailEl = document.createElement('div');
      detailEl.className = 'gene-detail';

      const maxRows = Math.max(gene.syndromesPresent.length, gene.syndromesAbsent.length);
      const tableRows = Array.from({length: maxRows}, (_, i) => {
        const p = gene.syndromesPresent[i] || '';
        const a = gene.syndromesAbsent[i] || '';
        return `<tr><td>${p}</td><td>${a}</td></tr>`;
      }).join('');

      const syndromeTable = maxRows > 0 ? `
        <table class="gd-table">
          <thead><tr><th>Present in the cohort</th><th>Absent in the cohort</th></tr></thead>
          <tbody>${tableRows}</tbody>
        </table>` : '<span class="gd-val" style="color:#9b8f84;">—</span>';

      const refLinks = gene.refs.map(r =>
        `<span style="display:flex;gap:5px;align-items:baseline;"><span style="flex-shrink:0;color:#c8bdb5;">·</span><a href="${r.url}" target="_blank">${r.label}</a></span>`
      ).join('');

      detailEl.innerHTML = `
        <div class="gd-row"><span class="gd-label">Full name</span><span class="gd-val">${gene.fullName}</span></div>
        <div class="gd-row"><span class="gd-label">Protein</span><span class="gd-val">${gene.protein}</span></div>
        <div class="gd-row"><span class="gd-label">Function</span><span class="gd-val">${gene.function}</span></div>
        <div class="gd-row" style="flex-direction:column;gap:4px;"><span class="gd-label">Clinical syndromes</span>${syndromeTable}</div>
        ${gene.notes ? `<div class="gd-row"><span class="gd-label">Notes</span><span class="gd-val">${gene.notes}</span></div>` : ''}
        <div class="gd-row" style="flex-direction:column;gap:4px;"><span class="gd-label">Selected literature</span><span class="gd-val gd-refs">${refLinks}</span></div>
      `;

      row.addEventListener('click', e => {
        e.stopPropagation();
        const geneHint = document.getElementById('geneHint');
        if (geneHint && geneHint.style.opacity !== '0') {
          geneHint.style.transition = 'opacity 0.3s';
          geneHint.style.opacity = '0';
        }
        const isOpen = detailEl.classList.contains('open');
        gGrid.querySelectorAll('.gene-detail').forEach(d => d.classList.remove('open'));
        if (!isOpen) detailEl.classList.add('open');
        row.style.borderRadius = detailEl.classList.contains('open') ? '7px 7px 0 0' : '7px';
      });

      gGrid.appendChild(row);
      gGrid.appendChild(detailEl);
    });

    document.querySelectorAll('.leg-item').forEach(el => {
      el.classList.toggle('dim', el.dataset.cat !== name);
    });
  }
}

Object.entries(PALETTE).forEach(([name, c]) => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.dataset.cat = name;
  item.innerHTML = `<span class="leg-dot" style="background:${c.fill}"></span><span>${name}</span>`;
  item.addEventListener('click', () => toggleCat(name));
  legendEl.appendChild(item);
});

if (window.matchMedia('(max-width: 768px)').matches || 'ontouchstart' in window) {
  const arrowEl = document.getElementById('crayonArrow');
  if (arrowEl) arrowEl.remove();
}
</script>

<style>
:root { --arrow-col: #C2510A; }
.ga [fill="#C2510A"] { fill: var(--arrow-col); }
</style>

<script>
(function() {
  function adjustViewBox() {
    var svg = document.getElementById('sbsvg');
    if (!svg) return;
    var isMobile = window.matchMedia('(max-width: 768px)').matches;
    svg.setAttribute('viewBox', isMobile ? '-50 -50 390 390' : '0 0 380 380');
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', adjustViewBox);
  } else {
    adjustViewBox();
  }
  window.addEventListener('load', adjustViewBox);
  window.addEventListener('resize', adjustViewBox);
})();
</script>

<script>
/* Communique la hauteur réelle au parent (cipo.md filtre par e.source).
   Utilise document.body.scrollHeight pour éviter les boucles de feedback
   (cf. note dans actg2-wt-mutant.html). */
(function () {
  var lastPosted = 0;
  function postHeight() {
    try {
      var h = document.body.scrollHeight;
      if (h === lastPosted) return;
      lastPosted = h;
      window.parent.postMessage({ sunburstHeight: h }, '*');
    } catch (e) {}
  }
  function init() {
    postHeight();
    [200, 600, 1200, 2000].forEach(function (d) { setTimeout(postHeight, d); });
    if (typeof ResizeObserver !== 'undefined') {
      try {
        var ro = new ResizeObserver(postHeight);
        ro.observe(document.body);
      } catch (e) {}
    }
    window.addEventListener('resize', postHeight);
    // Repost after any user click — covers panel expansion / gene rows / legend toggles
    document.addEventListener('click', function () {
      requestAnimationFrame(function () { requestAnimationFrame(postHeight); });
    });
  }
  if (document.readyState === 'complete') init();
  else window.addEventListener('load', init);
})();
</script>
