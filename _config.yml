# -------------------
# Jekyll Config
# --------------------
baseurl: ""
url: "https://minhchau-ta.github.io"
permalink: pretty
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-environment-variables
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page/:num"

# Collections
collections_dir: collections
collections:
  projects:
    output: true
    permalink: /:collection/:path/
  posts:
    output: true
    permalink: /blog/:path/

# Pages
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      weight: 999
  - scope:
      path: "images"
    values:
      image: true
  - scope:
      path: "categories"
    values:
      permalink: /category/:basename/
  - scope:
      path: "pages"
    values:
      permalink: /:basename/

# SCSS
sass:
  style: compact

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - netlify.toml


# -------------------
# Theme Config
# --------------------
title: "Minh-Chau Ta, MD"
category_dir: category

colors:
  #light-mode colors
  primary_bg: "#F7F0E2"
  primary_bg_2: "#F2E9D6"
  primary_bg_3: "#EDE0C8"
  primary_text: "#2C2416"
  base_bg: "#FBF6EC"
  base_bg_2: "#F7F0E2"
  base_bg_3: "#F2E9D6"
  base_text: "#2C2416"
  base_text_2: "#4A3F2F"
  logo_text: "#2C2416"
  header_text: "#2C2416"

  # dark-mode colors
  primary_bg_dark: "#F0E8D8"
  primary_bg_2_dark: "#F0E8D8"
  primary_bg_3_dark: "#F0E8D8"
  primary_text_dark: "#2C2416"
  base_bg_dark: "#1C1917"
  base_bg_2_dark: "#232019"
  base_bg_3_dark: "#2A271F"
  base_text_dark: "#E8DCC8"
  base_text_2_dark: "#B8A888"
  logo_text_dark: "#F0E8D8"
  header_text_dark: "#F0E8D8"

fonts:
  use_google_fonts: false
  google_fonts_url: "https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Fira+Mono&display=swap"
  use_self_hosted_fonts: true # font files must be placed in /assets/fonts folder and the @font-face definitions must be added to /assets/css/fonts.css
  heading: "'DM Sans'"
  base: "'DM Sans'"
  monospace: "'Fira Mono'"
  logo: "'DM Sans'"

logo:
  logo_text: "Minh-Chau Ta, MD"
  logo_image: assets/images/logo/logo.png
  logo_image_mobile: assets/images/logo/logo-mobile.png
  logo_image_invert: assets/images/logo/logo-invert.png
  logo_image_invert_mobile: assets/images/logo/logo-invert-mobile.png
  logo_image_desktop_height: "48px"
  logo_image_desktop_width: "48px"
  logo_image_mobile_height: "40px"
  logo_image_mobile_width: "40px"
  show_logo_image_on_mobile: true
  show_logo_image_on_desktop: true
  show_logo_text_on_mobile: false
  show_logo_text_on_desktop: false

header: 
  fixed: false

open_graph:
  meta_opengraph_type: "website"
  meta_twitter_card: "summary"
  meta_twitter_site: ""
  meta_twitter_creator: ""

darkmode:
  enable_dark_mode: true
  show_dark_mode_toggle_in_header: true
  show_dark_mode_toggle_in_bottom: false
  show_dark_mode_toggle_in_mobile_menu: true

cookie_banner:
  enabled: true
  show_manage_cookies_at_bottom: true

analytics:
  disable_analytics_on_localhost: false # prevents polluting analytics data while developing but enabling can be useful
  google_analytics_id: "" # G-XXXXXXXXXX
  gtm_id: "" # GTM-XXXXXXXX
  plausible_data_domain: "" # mywebsite.com
  umami_data_website_id: "" # ddd14336-5fb0-4cdd-8f32-e1bfa906cc2b
  umami_src: "" # https://analytics.eu.umami.is/script.js

comments:
  commento:
    enabled: false # you must have a commento account and be on the correct domain. does not work locally.
  disqus:
    shortname: "" # Your disqus shortcode for example "zerostatic". leave this blank ie "" to disable.

newsletter:
  mailchimp:
    form_action_url: ""
    form_title: "Let's keep in touch"

contact_form: 
  use_netlify_form: false
  use_formspree_form: true
  formspree_endpoint: https://formspree.io/f/moqyklqv
  netlify_form_name: "contact"

menu: 
  show_dropdown_items_in_mobile_menu: false
  show_social_media_in_mobile_menu: true

footer:
  enable_footer: true # show/hide the entire footer
  footer_title: "Minh-Chau Ta, MD"
  footer_description: ""
  enable_social_media_icons: true
  enable_contact_details: false
  enable_menu_footer_primary: false
  enable_menu_footer_secondary: false
  enable_menu_footer_tertiary: false
  footer_primary_menu_title: "Research"
  footer_secondary_menu_title: "Links"
  footer_tertiary_menu_title: "Other"

bottom:
  enable_bottom: true # show/hide the entire bottom (below the footer)
  enable_bottom_menu: false # if enabled, the bottom menu can be edited in `_data/menu.yml`
  copyright_text: "© 2026 Minh-Chau Ta"
  show_rss_icon: true