# -------------------
# Jekyll Config
# --------------------
baseurl: ""
url: "https://minhchau-ta.github.io"
permalink: pretty
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-environment-variables
  - jekyll-paginate

paginate: 6
paginate_path: "/blog/page/:num"

# Collections
collections_dir: collections
collections:
  projects:
    output: true
    permalink: /:collection/:path/
  posts:
    output: true
    permalink: /blog/:path/

# Pages
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      weight: 999
  - scope:
      path: "images"
    values:
      image: true
  - scope:
      path: "categories"
    values:
      permalink: /category/:basename/
  - scope:
      path: "pages"
    values:
      permalink: /:basename/

# SCSS
sass:
  style: compact

# Excludes
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - netlify.toml


# -------------------
# Theme Config
# --------------------
title: "Minh-Chau Ta, MD"
category_dir: category

colors:
  primary_bg: "#F7F0E2"
  primary_bg_2: "#F2E9D6"
  primary_bg_3: "#EDE0C8"
  primary_text: "#2C2416"
  base_bg: "#FBF6EC"
  base_bg_2: "#F7F0E2"
  base_bg_3: "#F2E9D6"
  base_text: "#2C2416"
  base_text_2: "#4A3F2F"
  logo_text: "#2C2416"
  header_text: "#2C2416"

fonts:
  use_google_fonts: false
  google_fonts_url: "https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Fira+Mono&display=swap"
  use_self_hosted_fonts: true
  heading: "'DM Sans'"
  base: "'DM Sans'"
  monospace: "'Fira Mono'"
  logo: "'DM Sans'"

logo:
  logo_text: "Minh-Chau Ta, MD"
  logo_image: assets/images/logo/logo.png
  logo_image_mobile: assets/images/logo/logo-mobile.png
  logo_image_invert: assets/images/logo/logo-invert.png
  logo_image_invert_mobile: assets/images/logo/logo-invert-mobile.png
  logo_image_desktop_height: "48px"
  logo_image_desktop_width: "48px"
  logo_image_mobile_height: "40px"
  logo_image_mobile_width: "40px"
  show_logo_image_on_mobile: true
  show_logo_image_on_desktop: true
  show_logo_text_on_mobile: false
  show_logo_text_on_desktop: false

header: 
  fixed: false

open_graph:
  meta_opengraph_type: "website"
  meta_twitter_card: "summary"
  meta_twitter_site: ""
  meta_twitter_creator: ""

darkmode:
  enable_dark_mode: false
  show_dark_mode_toggle_in_header: false
  show_dark_mode_toggle_in_bottom: false
  show_dark_mode_toggle_in_mobile_menu: false

cookie_banner:
  enabled: true
  show_manage_cookies_at_bottom: true

analytics:
  disable_analytics_on_localhost: false
  google_analytics_id: ""
  gtm_id: ""
  plausible_data_domain: ""
  umami_data_website_id: ""
  umami_src: ""

comments:
  commento:
    enabled: false
  disqus:
    shortname: ""

newsletter:
  mailchimp:
    form_action_url: ""
    form_title: "Let's keep in touch"

contact_form: 
  use_netlify_form: false
  use_formspree_form: true
  formspree_endpoint: https://formspree.io/f/moqyklqv
  netlify_form_name: "contact"

menu: 
  show_dropdown_items_in_mobile_menu: false
  show_social_media_in_mobile_menu: true

footer:
  enable_footer: true
  footer_title: "Minh-Chau Ta, MD"
  footer_description: ""
  enable_social_media_icons: true
  enable_contact_details: false
  enable_menu_footer_primary: true
  enable_menu_footer_secondary: false
  enable_menu_footer_tertiary: false
  footer_primary_menu_title: ""
  footer_secondary_menu_title: "Links"
  footer_tertiary_menu_title: "Other"

bottom:
  enable_bottom: true
  enable_bottom_menu: false
  copyright_text: "© 2026 Minh-Chau Thom"
  show_rss_icon: true
webrick:
  mime_types:
    pdb: chemical/x-pdb
